<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Quest 3D Layers Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        let scene, camera, renderer, layers = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();

            // 1. ЗАДНИЙ СЛОЙ (Background)
            const bgGeo = new THREE.PlaneGeometry(10, 6);
            const bgMat = new THREE.MeshBasicMaterial({ map: loader.load('assets/hero-bg/4.jpg') });
            const bgMesh = new THREE.Mesh(bgGeo, bgMat);
            bgMesh.position.z = -2; // Уносим назад
            scene.add(bgMesh);
            layers.push({ mesh: bgMesh, factor: 0.05 }); // Мизерный сдвиг

            // 2. СРЕДНИЙ СЛОЙ (Кружочки)
            // Создадим группу кружочков
            const circlesGroup = new THREE.Group();
            for(let i = 0; i < 15; i++) {
                const circleGeo = new THREE.CircleGeometry(0.1, 32);
                const circleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
                const circle = new THREE.Mesh(circleGeo, circleMat);
                circle.position.set(Math.random()*4 - 2, Math.random()*3 - 1.5, 0);
                circlesGroup.add(circle);
            }
            circlesGroup.position.z = 1; 
            scene.add(circlesGroup);
            layers.push({ mesh: circlesGroup, factor: 0.15 }); // Средний сдвиг

            // 3. ПЕРЕДНИЙ СЛОЙ (Кнопки)
            // Для примера просто создадим белые прямоугольники-заглушки
            const uiGroup = new THREE.Group();
            for(let i = 0; i < 3; i++) {
                const btnGeo = new THREE.PlaneGeometry(0.8, 0.3);
                const btnMat = new THREE.MeshBasicMaterial({ color: 0x0078ff });
                const btn = new THREE.Mesh(btnGeo, btnMat);
                btn.position.set(0, (i - 1) * 0.5, 0);
                uiGroup.add(btn);
            }
            uiGroup.position.z = 2.5; 
            scene.add(uiGroup);
            layers.push({ mesh: uiGroup, factor: 0.3 }); // Самый сильный сдвиг
        }

        // Отслеживание наклона (Orientation)
        let mouseX = 0, mouseY = 0;
        window.addEventListener('deviceorientation', (e) => {
            // Используем углы наклона шлема
            mouseX = (e.gamma || 0) / 30; 
            mouseY = (e.beta - 90 || 0) / 30; 
        });

        // Для теста на ПК (мышкой)
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);

            // Применяем параллакс к каждому слою
            layers.forEach(layer => {
                const targetX = mouseX * layer.factor;
                const targetY = mouseY * layer.factor;
                
                // Плавное следование за целью (Lerp)
                layer.mesh.position.x += (targetX - layer.mesh.position.x) * 0.1;
                layer.mesh.position.y += (targetY - layer.mesh.position.y) * 0.1;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
